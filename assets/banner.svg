<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" width="1000" height="320" font-family="'Arial Narrow','Helvetica Neue',Arial,sans-serif">
<defs>
  <linearGradient id="card" x1="0" y1="0" x2="0.5" y2="1">
    <stop offset="0" stop-color="#0E1736"/><stop offset="1" stop-color="#090E26"/>
  </linearGradient>
  <linearGradient id="accent" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#E10600"/><stop offset="1" stop-color="#FFC400"/>
  </linearGradient>
  <linearGradient id="fade" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#27315e"/><stop offset="1" stop-color="#27315e" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="redfade" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0" stop-color="#E10600"/><stop offset="1" stop-color="#E10600" stop-opacity="0"/>
  </linearGradient>
  <linearGradient id="carbody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FF2418"/><stop offset="1" stop-color="#C8102E"/></linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/><stop offset="1" stop-color="#AEB8E0"/></linearGradient>
    <clipPath id="bclip"><rect width="1000" height="320" rx="14"/></clipPath>
</defs>
<style>.live{animation:pulse 1.6s ease-in-out infinite;transform-origin:center}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    .cur{animation:blink 1.1s step-end infinite}
    @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
    .car{animation:drive 7s cubic-bezier(.45,0,.55,1) infinite}
    @keyframes drive{0%{transform:translateX(-260px)}55%,100%{transform:translateX(1120px)}}
    .wheel{animation:spin .45s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .streak{animation:slide 6s linear infinite}
    @keyframes slide{to{transform:translateX(-322px)}}
    .tl{opacity:0;animation:cycle 9s infinite}
    .tl2{animation-delay:3s} .tl3{animation-delay:6s}
    @keyframes cycle{0%{opacity:0}4%,29%{opacity:1}33%,100%{opacity:0}}</style>
<g clip-path="url(#bclip)">
  <rect width="1000" height="320" fill="#05081A"/>
  <rect width="1000" height="320" fill="url(#card)" opacity="0.6"/>
  <g transform="skewX(-20)" opacity="0.9"><rect class="streak" x="-322" y="0" width="2" height="320" fill="#FFC400" opacity="0.05"/><rect class="streak" x="-172" y="0" width="2" height="320" fill="#E10600" opacity="0.06"/><rect class="streak" x="0" y="0" width="2" height="320" fill="#FFC400" opacity="0.05"/><rect class="streak" x="150" y="0" width="2" height="320" fill="#E10600" opacity="0.06"/><rect class="streak" x="322" y="0" width="2" height="320" fill="#FFC400" opacity="0.05"/><rect class="streak" x="472" y="0" width="2" height="320" fill="#E10600" opacity="0.06"/><rect class="streak" x="644" y="0" width="2" height="320" fill="#FFC400" opacity="0.05"/><rect class="streak" x="794" y="0" width="2" height="320" fill="#E10600" opacity="0.06"/><rect class="streak" x="966" y="0" width="2" height="320" fill="#FFC400" opacity="0.05"/><rect class="streak" x="1116" y="0" width="2" height="320" fill="#E10600" opacity="0.06"/></g>

  <!-- HUD bar -->
  <rect x="0" y="0" width="1000" height="30" fill="#090E26"/>
  <rect x="0" y="0" width="42" height="30" fill="#E10600"/>
  <text x="21" y="20" font-family="'Cascadia Code','Consolas','SFMono-Regular',ui-monospace,monospace" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">P1</text>
  <circle class="live" cx="62" cy="15" r="4" fill="#22D67A"/>
  <text x="76" y="19" font-family="'Cascadia Code','Consolas','SFMono-Regular',ui-monospace,monospace" font-size="11" font-weight="700" letter-spacing="2" fill="#E9EDFB">DBISINA</text>
  <rect x="170" y="0" width="92" height="30" fill="#090E26"/>
<text x="182" y="19" font-family="'Cascadia Code','Consolas','SFMono-Regular',ui-monospace,monospace" font-size="11" letter-spacing="1" fill="#5C6790">LAP</text>
<text x="208" y="19" font-family="'Cascadia Code','Consolas','SFMono-Regular',ui-monospace,monospace" font-size="11" font-weight="700" fill="#E9EDFB">27/58</text>
  <rect x="262" y="0" width="70" height="30" fill="#090E26"/>
<text x="274" y="19" font-family="'Cascadia Code','Consolas','SFMono-Regular',ui-monospace,monospace" font-size="11" letter-spacing="1" fill="#5C6790">DRS</text>
<text x="300" y="19" font-family="'Cascadia Code','Consolas','SFMono-Regular',ui-monospace,monospace" font-size="11" font-weight="700" fill="#FFC400">ON</text>
  <rect x="332" y="0" width="118" height="30" fill="#090E26"/>
<text x="344" y="19" font-family="'Cascadia Code','Consolas','SFMono-Regular',ui-monospace,monospace" font-size="11" letter-spacing="1" fill="#5C6790">SPD</text>
<text x="370" y="19" font-family="'Cascadia Code','Consolas','SFMono-Regular',ui-monospace,monospace" font-size="11" font-weight="700" fill="#22D67A">318 KM/H</text>
  <rect x="820" y="0" width="180" height="30" fill="#090E26"/>
<text x="832" y="19" font-family="'Cascadia Code','Consolas','SFMono-Regular',ui-monospace,monospace" font-size="11" letter-spacing="1" fill="#5C6790">GEAR</text>
<text x="864" y="19" font-family="'Cascadia Code','Consolas','SFMono-Regular',ui-monospace,monospace" font-size="11" font-weight="700" fill="#FFC400">6  ·  ERS 88%</text>

  <!-- kicker -->
  <rect x="40" y="62" width="34" height="3" rx="1.5" fill="#E10600"/>
  <text x="84" y="68" font-family="'Cascadia Code','Consolas','SFMono-Regular',ui-monospace,monospace" font-size="12" font-weight="700" letter-spacing="4" fill="#FFC400">REDLINE GARAGE</text>

  <!-- name -->
  <text x="38" y="150" font-family="'Arial Narrow','Helvetica Neue',Arial,sans-serif" font-size="92" font-weight="900" letter-spacing="-1" fill="url(#title)">DBISINA</text>
  <text x="42" y="184" font-family="'Arial Narrow','Helvetica Neue',Arial,sans-serif" font-size="20" font-weight="700" letter-spacing="2" fill="#E9EDFB">AI &amp; SYSTEMS ENGINEER</text>
  <rect class="cur" x="324" y="170" width="9" height="18" fill="#FFC400"/>

  <!-- cycling tagline -->
  <g font-family="'Cascadia Code','Consolas','SFMono-Regular',ui-monospace,monospace" font-size="14">
    <text x="42" y="214" fill="#6B76A6"><tspan fill="#22D67A">&gt; </tspan><tspan class="tl">AI Systems &amp; Kernel Optimization</tspan></text>
    <text x="42" y="214" fill="#6B76A6"><tspan fill="#22D67A">&gt; </tspan><tspan class="tl tl2">High-Performance Computing</tspan></text>
    <text x="42" y="214" fill="#6B76A6"><tspan fill="#22D67A">&gt; </tspan><tspan class="tl tl3">Building the future, one commit at a time</tspan></text>
  </g>
  <text x="42" y="246" font-family="'Arial Narrow','Helvetica Neue',Arial,sans-serif" font-size="14" font-style="italic" fill="#C8D0EE">"Building foundational technology that moves humanity forward."</text>
  <rect x="38" y="232" width="3" height="20" fill="#E10600"/>

  <!-- animated car drives along the lower lane -->
  <g class="car"><g transform="translate(0,244)"><g transform="translate(0,0) scale(1.0)">
  <!-- speed lines -->
  <g class="trail" stroke="#FFC400" stroke-width="2" stroke-linecap="round" opacity="0.7">
    <line x1="-60" y1="34" x2="6"  y2="34"/><line x1="-90" y1="46" x2="-14" y2="46"/>
    <line x1="-50" y1="58" x2="20" y2="58"/>
  </g>
  <!-- floor -->
  <polygon points="40,60 192,60 188,67 44,67" fill="#0c1124"/>
  <!-- rear wing -->
  <rect x="40" y="22" width="9" height="30" rx="2" fill="#14182f"/>
  <polygon points="32,18 60,18 60,25 32,25" fill="#14182f"/>
  <rect x="32" y="18" width="28" height="2.5" fill="#FFC400"/>
  <!-- body -->
  <polygon points="50,60 60,38 86,31 108,41 150,42 198,55 172,60"
           fill="url(#carbody)" stroke="#7a0c06" stroke-width="1"/>
  <!-- sidepod shadow + intake -->
  <polygon points="92,46 130,46 126,58 96,58" fill="#a40d04"/>
  <!-- halo + cockpit -->
  <path d="M104,42 Q122,24 140,42" fill="none" stroke="#0b0e1c" stroke-width="4"/>
  <ellipse cx="112" cy="42" rx="8" ry="5" fill="#0b0e1c"/>
  <!-- nose tip + front wing -->
  <polygon points="198,55 214,57 214,61 184,61 184,57" fill="#14182f"/>
  <rect x="184" y="56" width="30" height="2.5" fill="#FFC400"/>
  <!-- number roundel -->
  <circle cx="78" cy="48" r="9" fill="#fff"/>
  <text x="78" y="52" font-family="'Arial Narrow','Helvetica Neue',Arial,sans-serif" font-size="12" font-weight="900" fill="#E10600" text-anchor="middle">1</text>
  <!-- wheels -->
  <g class="wheel" style="transform-box:fill-box;transform-origin:center" transform="translate(60,60)">
    <circle r="16" fill="#101422" stroke="#5b6aa6" stroke-width="2.5"/>
    <circle r="6.5" fill="#1a1f38" stroke="#FFC400" stroke-width="1.4"/>
    <g stroke="#FFC400" stroke-width="1.5" opacity="0.85"><line x1="-12" y1="0" x2="12" y2="0"/><line x1="0" y1="-12" x2="0" y2="12"/></g>
  </g>
  <g class="wheel" style="transform-box:fill-box;transform-origin:center" transform="translate(166,60)">
    <circle r="16" fill="#101422" stroke="#5b6aa6" stroke-width="2.5"/>
    <circle r="6.5" fill="#1a1f38" stroke="#FFC400" stroke-width="1.4"/>
    <g stroke="#FFC400" stroke-width="1.5" opacity="0.85"><line x1="-12" y1="0" x2="12" y2="0"/><line x1="0" y1="-12" x2="0" y2="12"/></g>
  </g>
</g></g></g>

  <!-- driver dossier -->
  <g transform="translate(726,52)">
    <rect width="246" height="240" rx="10" fill="#0c1330" stroke="#27315e"/>
    <rect width="246" height="240" rx="10" fill="none" stroke="#E10600" stroke-opacity="0.25"/>
    <text x="16" y="28" font-family="'Cascadia Code','Consolas','SFMono-Regular',ui-monospace,monospace" font-size="10" letter-spacing="2" fill="#6B76A6">DRIVER CARD</text>
    <circle cx="214" cy="24" r="4" class="live" fill="#FFC400"/>
    <text x="200" y="28" font-family="'Cascadia Code','Consolas','SFMono-Regular',ui-monospace,monospace" font-size="10" fill="#FFC400" text-anchor="end">ACTIVE</text>
    <text x="14" y="118" font-family="'Arial Narrow','Helvetica Neue',Arial,sans-serif" font-size="92" font-weight="900" fill="#E10600">01</text>
    <text x="150" y="118" font-family="'Arial Narrow','Helvetica Neue',Arial,sans-serif" font-size="30" font-weight="900" letter-spacing="6" fill="#fff">BIS</text>
    <rect x="16" y="132" width="214" height="1.5" fill="url(#redfade)"/>
    <g font-family="'Cascadia Code','Consolas','SFMono-Regular',ui-monospace,monospace">
      <text x="16" y="158" font-size="9" letter-spacing="1.5" fill="#5C6790">TEAM</text>
      <text x="16" y="174" font-size="13" fill="#E9EDFB">Redline</text>
      <text x="130" y="158" font-size="9" letter-spacing="1.5" fill="#5C6790">POWER UNIT</text>
      <text x="130" y="174" font-size="13" fill="#E9EDFB">AI / HPC</text>
      <text x="16" y="206" font-size="9" letter-spacing="1.5" fill="#5C6790">TYRES</text>
      <text x="16" y="222" font-size="13" fill="#FFC400">SOFT ◉</text>
      <text x="130" y="206" font-size="9" letter-spacing="1.5" fill="#5C6790">STATUS</text>
      <text x="130" y="222" font-size="13" fill="#22D67A">SHIPPING</text>
    </g>
  </g>
  <rect x="0" y="0" width="1000" height="320" rx="14" fill="none" stroke="#27315e"/>
</g>
</svg>